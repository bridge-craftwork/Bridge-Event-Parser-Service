name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all

  smoke:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: bridge-event-parser-service
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: bridge-event-parser-service
          load: true
          tags: bridge-event-parser-service:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run container
        run: |
          docker run -d --rm --name beps \
            -p 3001:3001 \
            -e LOG_FORMAT=pretty \
            bridge-event-parser-service:smoke
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/healthz >/dev/null; then break; fi
            sleep 1
          done
      - name: GET /healthz
        run: |
          response=$(curl -sS http://localhost:3001/healthz)
          echo "$response"
          echo "$response" | grep -q '"status":"ok"' || (echo "healthz failed" && exit 1)
      - name: Stop container
        if: always()
        run: docker stop beps || true

  build-and-push:
    needs: smoke
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine tags
        id: tags
        run: |
          TAGS="ghcr.io/bridge-craftwork/bridge-event-parser-service:main"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            TAGS="$TAGS,ghcr.io/bridge-craftwork/bridge-event-parser-service:${VERSION},ghcr.io/bridge-craftwork/bridge-event-parser-service:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
